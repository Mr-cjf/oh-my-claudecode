name: i18n Auto-Sync

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Manual trigger
    inputs:
      upstream_repo:
        description: 'Upstream repository (owner/repo)'
        required: false
        default: 'Yeachan-Heo/oh-my-claudecode'
      upstream_branch:
        description: 'Upstream branch'
        required: false
        default: 'main'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-and-translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Fetch upstream changes
        run: |
          UPSTREAM_REPO="${{ github.event.inputs.upstream_repo || 'Yeachan-Heo/oh-my-claudecode' }}"
          UPSTREAM_BRANCH="${{ github.event.inputs.upstream_branch || 'main' }}"

          echo "Fetching from $UPSTREAM_REPO/$UPSTREAM_BRANCH..."

          git remote add upstream "https://github.com/$UPSTREAM_REPO.git" || git remote set-url upstream "https://github.com/$UPSTREAM_REPO.git"
          git fetch upstream $UPSTREAM_BRANCH

          # Get the diff
          git diff HEAD upstream/$UPSTREAM_BRANCH --stat > /tmp/upstream-diff.txt
          cat /tmp/upstream-diff.txt

      - name: Check for new strings
        id: check
        run: |
          # Run i18n sync to detect new strings
          npm run i18n:sync

          # Check if there are new translations
          if [ -f ".omc/i18n-sync-report.json" ]; then
            NEW_COUNT=$(jq '.newStringsCount' .omc/i18n-sync-report.json)
            if [ "$NEW_COUNT" -gt 0 ]; then
              echo "has_new_strings=true" >> $GITHUB_OUTPUT
              echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Auto-translate new strings
        if: steps.check.outputs.has_new_strings == 'true'
        run: |
          npm run i18n:apply
        env:
          I18N_FREE_PROVIDER: mymemory  # Use free translation service

      - name: Commit and push translations
        if: steps.check.outputs.has_new_strings == 'true'
        run: |
          # Commit changes directly to main
          git add src/i18n/locales/*.json
          git commit -m "chore(i18n): auto-translate ${{ steps.check.outputs.new_count }} new strings" -m "Auto-translated by i18n-auto-sync workflow"
          git push origin main

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.has_new_strings }}" = "true" ]; then
            echo "✅ Committed ${{ steps.check.outputs.new_count }} new translations to main"
          else
            echo "✅ No new strings to translate"
          fi