name: i18n Auto-Sync

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Manual trigger
    inputs:
      upstream_repo:
        description: 'Upstream repository (owner/repo)'
        required: false
        default: 'Yeachan-Heo/oh-my-claudecode'
      upstream_branch:
        description: 'Upstream branch'
        required: false
        default: 'main'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-and-translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Fetch upstream changes
        run: |
          UPSTREAM_REPO="${{ github.event.inputs.upstream_repo || 'Yeachan-Heo/oh-my-claudecode' }}"
          UPSTREAM_BRANCH="${{ github.event.inputs.upstream_branch || 'main' }}"

          echo "Fetching from $UPSTREAM_REPO/$UPSTREAM_BRANCH..."

          git remote add upstream "https://github.com/$UPSTREAM_REPO.git" || git remote set-url upstream "https://github.com/$UPSTREAM_REPO.git"
          git fetch upstream $UPSTREAM_BRANCH

          # Get the diff
          git diff HEAD upstream/$UPSTREAM_BRANCH --stat > /tmp/upstream-diff.txt
          cat /tmp/upstream-diff.txt

      - name: Check for new strings
        id: check
        run: |
          # Run i18n sync to detect new strings
          npm run i18n:sync

          # Check if there are new translations
          if [ -f ".omc/i18n-sync-report.json" ]; then
            NEW_COUNT=$(jq '.newStringsCount' .omc/i18n-sync-report.json)
            if [ "$NEW_COUNT" -gt 0 ]; then
              echo "has_new_strings=true" >> $GITHUB_OUTPUT
              echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Auto-translate new strings
        if: steps.check.outputs.has_new_strings == 'true'
        run: |
          npm run i18n:apply
        env:
          I18N_FREE_PROVIDER: mymemory  # Use free translation service

      - name: Create Pull Request
        if: steps.check.outputs.has_new_strings == 'true'
        run: |
          # Create a new branch
          BRANCH_NAME="i18n/auto-sync-$(date +%Y%m%d-%H%M%S)"
          git checkout -b $BRANCH_NAME

          # Commit changes
          git add src/i18n/locales/*.json
          git commit -m "chore(i18n): auto-translate ${{ steps.check.outputs.new_count }} new strings" -m "This PR was automatically generated by the i18n auto-sync workflow." -m "Changes:" -m "- Detected ${{ steps.check.outputs.new_count }} new hardcoded strings" -m "- Auto-translated to Chinese using Claude API" -m "- Updated translation files" -m "Please review the translations before merging."

          # Push branch
          git push origin $BRANCH_NAME

          # Create PR
          printf '%s\n' \
            '## Summary' \
            '' \
            'This PR was automatically generated by the i18n auto-sync workflow.' \
            '' \
            '### Changes' \
            '- Detected **${{ steps.check.outputs.new_count }}** new hardcoded strings' \
            '- Auto-translated to Chinese using Claude API' \
            '- Updated translation files: `src/i18n/locales/en.json` and `src/i18n/locales/zh.json`' \
            '' \
            '### Review Checklist' \
            '- [ ] Review auto-translated strings for accuracy' \
            '- [ ] Check for any missing context or incorrect translations' \
            '- [ ] Verify translations do not break existing functionality' \
            '- [ ] Test with `LANG=zh_CN.UTF-8 omc --help`' \
            '' \
            '### Testing' \
            '```bash' \
            '# Test Chinese' \
            'omc --help' \
            '' \
            '# Test English' \
            'LANG=en_US.UTF-8 omc --help' \
            '```' \
            '' \
            '### Next Steps' \
            'After merging, the new translations will be available immediately.' \
            '' \
            '---' \
            '*This PR was created by the [i18n auto-sync workflow](.github/workflows/i18n-auto-sync.yml)*' \
            > /tmp/pr-body.md
          gh pr create \
            --head "$BRANCH_NAME" \
            --title "i18n: Auto-translate ${{ steps.check.outputs.new_count }} new strings" \
            --body-file /tmp/pr-body.md \
            --base dev
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.has_new_strings }}" = "true" ]; then
            echo "✅ Created PR with ${{ steps.check.outputs.new_count }} new translations"
          else
            echo "✅ No new strings to translate"
          fi